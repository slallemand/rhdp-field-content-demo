# Injected by RHDP
deployer:
  domain: apps.cluster-example.redhatworkshops.io
  apiUrl: https://api.cluster-example.redhatworkshops.io:6443

# Git repository configuration
gitUrl: https://github.com/slallemand/rhdp-field-content-demo.git
gitRef: main

# ArgoCD configuration
argocd:
  namespace: openshift-gitops

# Namespace for field content deployment
namespace: field-content-demo

# User information (injected by RHDP)
userInfo:
  user: admin
  password: ""
  guid: ""

# Operators to deploy
operators:
  openshift-pipelines:
    enabled: true
    name: openshift-pipelines-operator-rh
    channel: latest
    source: redhat-operators
    namespace: openshift-operators
    wave: -20

  web-terminal:
    enabled: true
    name: web-terminal
    channel: fast
    source: redhat-operators
    namespace: openshift-operators
    wave: -20

# Helm charts to deploy
helmCharts:
  # # Showroom demo - Interactive demo content using official RHPDS single-pod chart
  # showroom-demo:
  #   enabled: true
  #   namespace: showroom
  #   wave: 20
  #   source:
  #     # Official RHPDS Showroom deployer Helm chart (single pod version)
  #     repoURL: https://rhpds.github.io/showroom-deployer
  #     chart: showroom-single-pod
  #     targetRevision: 2.1.7
  #   # Values for showroom-single-pod chart (matching rh-idp-lab model)
  #   valuesTemplate: |
  #     # Basic configuration
  #     guid: {{ .Values.userInfo.guid | default "demo" | quote }}
  #     user: {{ .Values.userInfo.user | default "admin" | quote }}

  #     deployer:
  #       domain: {{ .Values.deployer.domain | quote }}

  #     # Content repository configuration
  #     content:
  #       repoUrl: {{ .Values.gitUrl | quote }}
  #       repoRef: {{ .Values.gitRef | quote }}
  #       antoraPlaybook: site.yml
  #       enableDevMode: "true"

  #     # Disable components we don't need for a simple demo
  #     wetty:
  #       setup: "false"

  #     terminal:
  #       setup: "false"

  #     runtime_automation:
  #       setup: "false"

  #     nookbag_sidecar:
  #       setup: "false"

  # Example: Node.js "Hello RHDP" application
  hello-nodejs:
    enabled: true  # Set to true to deploy
    namespace: hello-nodejs
    wave: 10
    source:
      repoURL: https://github.com/slallemand/rhdp-field-content-demo.git
      targetRevision: HEAD
      path: apps/hello-nodejs
    values:
      replicas: 2

  # Example: Deploy another chart from this repo
  # my-app:
  #   enabled: true
  #   namespace: my-namespace
  #   wave: 0
  #   source:
  #     repoURL: https://github.com/slallemand/rhdp-field-content-demo.git
  #     targetRevision: HEAD
  #     path: charts/my-app
  #   values: {}  # Optional Helm values

