# Injected by RHDP
deployer:
  domain: apps.cluster-example.redhatworkshops.io
  apiUrl: https://api.cluster-example.redhatworkshops.io:6443

# Git repository configuration
gitUrl: https://github.com/slallemand/rhdp-field-content-demo.git
gitRef: main

# ArgoCD configuration
argocd:
  namespace: openshift-gitops

# Namespace for field content deployment
namespace: field-content-demo

# User information (injected by RHDP)
userInfo:
  user: admin
  password: ""
  guid: ""

# Operators to deploy
operators:
  openshift-pipelines:
    enabled: true
    name: openshift-pipelines-operator-rh
    channel: latest
    source: redhat-operators
    namespace: openshift-operators
    wave: -20

  web-terminal:
    enabled: true
    name: web-terminal
    channel: fast
    source: redhat-operators
    namespace: openshift-operators
    wave: -20

# Helm charts to deploy
helmCharts:
  # Showroom demo - Interactive demo content
  showroom-demo:
    enabled: true
    namespace: showroom
    wave: 20
    source:
      repoURL: https://github.com/slallemand/rhdp-field-content-demo.git
      targetRevision: HEAD
      path: components/showroom-demo
    # Values are injected via special template - see note below
    valuesTemplate: |
      deployer:
        apiUrl: {{ .Values.deployer.apiUrl | quote }}
        domain: {{ .Values.deployer.domain | quote }}
      userInfo:
        user: {{ .Values.userInfo.user | quote }}
        password: {{ .Values.userInfo.password | quote }}
        guid: {{ .Values.userInfo.guid | quote }}
      content:
        gitUrl: {{ .Values.gitUrl | quote }}
        gitRef: {{ .Values.gitRef | quote }}

  # Example: Node.js "Hello RHDP" application
  hello-nodejs:
    enabled: true  # Set to true to deploy
    namespace: hello-nodejs
    wave: 10
    source:
      repoURL: https://github.com/slallemand/rhdp-field-content-demo.git
      targetRevision: HEAD
      path: apps/hello-nodejs
    values:
      replicas: 2

  # Example: Deploy another chart from this repo
  # my-app:
  #   enabled: true
  #   namespace: my-namespace
  #   wave: 0
  #   source:
  #     repoURL: https://github.com/slallemand/rhdp-field-content-demo.git
  #     targetRevision: HEAD
  #     path: charts/my-app
  #   values: {}  # Optional Helm values

  # Example: Deploy a chart from a Helm repository
  # prometheus:
  #   enabled: true
  #   namespace: monitoring
  #   wave: 10
  #   source:
  #     repoURL: https://prometheus-community.github.io/helm-charts
  #     chart: prometheus
  #     targetRevision: 15.0.0
  #   values:
  #     server:
  #       retention: "30d"