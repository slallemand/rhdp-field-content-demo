apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.image.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.image.name }}
    demo.redhat.com/application: "field-content"
spec:
  to:
    kind: Service
    name: {{ .Values.image.name }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
