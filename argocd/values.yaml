# This is the entry point Helm chart deployed by RHDP Field Content CI
# It creates a single ArgoCD Application that deploys the root chart

argocd:
  namespace: openshift-gitops
  project: default

# GitOps configuration - overridden by RHDP deployer
gitops:
  repoURL: https://github.com/slallemand/rhdp-field-content-demo.git
  revision: main
  path: .  # Root chart location

# Deployer variables - injected by field content workload
deployer:
  apiUrl: https://api.cluster-example.redhatworkshops.io:6443
  domain: apps.cluster-example.redhatworkshops.io

# LiteMaaS configuration
litemaas:
  enabled: false
  apiKey: null
  apiUrl: null
  model: llama-scout-17b
